<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>前任焚烧炉</title>
<style>
/* ===== CSS 变量 & 全局 ===== */
:root {
  --bg: #0a0a0a;
  --bg-panel: #111;
  --parchment: #f4e1b3;
  --parchment-dark: #d4c094;
  --ink: #1a0f0a;
  --blood: #8b1a1a;
  --blood-light: #b52828;
  --gold: #b8943e;
  --ember: #ff5e13;
  --flame: #ffb000;
  --flame-hot: #fffbe0;
  --ash: #8a8a8a;
  --text: #c8c0b0;
  --text-dim: #6a6558;
  --healing: #7ec8a0;
  --radius: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow-x: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PingFang SC', 'Microsoft YaHei', '微软雅黑', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* 背景光晕 */
body::before {
  content: '';
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(255,94,19,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ===== 主容器 ===== */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 720px;
  min-height: 100vh;
  padding: 48px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== 音频按钮 ===== */
#audio-toggle {
  position: fixed;
  top: 24px; right: 24px;
  z-index: 100;
  width: 56px; height: 56px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
#audio-toggle:hover { border-color: rgba(255,255,255,0.3); }
#audio-toggle svg { width: 26px; height: 26px; fill: var(--text); transition: opacity 0.3s; }
#audio-toggle.muted .icon-on { opacity: 0.3; }
#audio-toggle.muted .slash { opacity: 1; }
#audio-toggle .slash { opacity: 0; position: absolute; width: 34px; height: 2px; background: var(--text); transform: rotate(-45deg); border-radius: 1px; transition: opacity 0.3s; }

/* ===== 阶段容器 ===== */
.phase { display: none; flex-direction: column; align-items: center; width: 100%; }
.phase.active { display: flex; }

/* ===== 标题 ===== */
.app-title {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--ember);
  text-align: center;
  margin-bottom: 8px;
  text-shadow: 0 0 50px rgba(255,94,19,0.3);
}
.app-subtitle {
  font-size: 18px;
  color: var(--text-dim);
  letter-spacing: 4px;
  margin-bottom: 48px;
}

/* ===== 输入区 ===== */
.input-group { width: 100%; margin-bottom: 28px; }
.input-group label { display: block; font-size: 18px; color: var(--text-dim); margin-bottom: 12px; letter-spacing: 1px; }

#name-input {
  width: 100%; padding: 18px 22px;
  background: var(--bg-panel);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 22px;
  outline: none;
  transition: border-color 0.3s;
  font-family: inherit;
}
#name-input:focus { border-color: var(--ember); }
#name-input::placeholder { color: var(--text-dim); }

/* 罪名标签 */
.crime-tags { display: flex; flex-wrap: wrap; gap: 14px; }
.crime-tag {
  padding: 12px 24px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 28px;
  background: var(--bg-panel);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 1px;
}
.crime-tag:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
.crime-tag.selected { border-color: var(--ember); color: var(--ember); background: rgba(255,94,19,0.08); box-shadow: 0 0 16px rgba(255,94,19,0.15); }

/* 生成按钮 */
#generate-btn {
  margin-top: 36px;
  padding: 16px 56px;
  border: 1px solid var(--ember);
  border-radius: 4px;
  background: transparent;
  color: var(--ember);
  font-size: 20px;
  letter-spacing: 5px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}
#generate-btn:hover { background: rgba(255,94,19,0.1); box-shadow: 0 0 24px rgba(255,94,19,0.2); }
#generate-btn:disabled { border-color: var(--text-dim); color: var(--text-dim); cursor: not-allowed; opacity: 0.5; }

/* ===== 通缉令画布区 ===== */
.canvas-wrapper {
  position: relative;
  width: 100%;
  max-width: 540px;
  aspect-ratio: 0.72;
  margin: 0 auto;
}
canvas.poster-layer, canvas.fire-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
canvas.poster-layer { z-index: 2; }
canvas.fire-layer { z-index: 3; pointer-events: none; }

/* 通缉令入场动画 */
@keyframes posterDrop {
  0% { opacity: 0; transform: translateY(-100px) rotate(-3deg); }
  60% { opacity: 1; transform: translateY(8px) rotate(0.5deg); }
  80% { transform: translateY(-4px) rotate(-0.3deg); }
  100% { opacity: 1; transform: translateY(0) rotate(0); }
}
.canvas-wrapper.drop-in { animation: posterDrop 0.9s ease-out forwards; }

/* ===== 火焰按钮 ===== */
#flame-btn-wrap {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
#flame-btn {
  width: 110px; height: 110px;
  border-radius: 50%;
  border: 2px solid var(--ember);
  background: radial-gradient(circle at center, rgba(255,94,19,0.2) 0%, rgba(0,0,0,0.6) 100%);
  cursor: pointer;
  position: relative;
  transition: all 0.3s;
  touch-action: none;
  animation: btnPulse 2s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
}
#flame-btn .btn-icon {
  font-size: 42px;
  position: relative;
  z-index: 1;
  pointer-events: none;
}
#flame-btn:active, #flame-btn.pressing { border-color: var(--flame); box-shadow: 0 0 50px rgba(255,176,0,0.5); }
#flame-btn .progress-ring {
  position: absolute;
  top: -6px; left: -6px;
  width: calc(100% + 12px); height: calc(100% + 12px);
  transform: rotate(-90deg);
  pointer-events: none;
  overflow: visible;
}
#flame-btn .progress-ring circle {
  fill: none;
  stroke: var(--flame);
  stroke-width: 3;
  stroke-dasharray: 0;
  stroke-dashoffset: 0;
  stroke-linecap: round;
  opacity: 0;
  transition: opacity 0.15s;
}
#flame-btn.pressing .progress-ring circle { opacity: 1; }

@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 16px rgba(255,94,19,0.2); }
  50% { box-shadow: 0 0 36px rgba(255,94,19,0.4); }
}

.flame-hint { font-size: 16px; color: var(--text-dim); letter-spacing: 2px; animation: hintBlink 2s ease-in-out infinite; }
@keyframes hintBlink {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ===== 治愈阶段 ===== */
#healing-section { text-align: center; }
#healing-section .heal-icon {
  font-size: 72px; margin-bottom: 28px;
  animation: healFloat 3s ease-in-out infinite;
}
@keyframes healFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-16px); }
}
#healing-section .heal-quote {
  font-size: 24px;
  line-height: 1.8;
  color: var(--healing);
  letter-spacing: 2px;
  max-width: 480px;
  animation: fadeInUp 1s ease-out;
}
@keyframes fadeInUp {
  0% { opacity: 0; transform: translateY(24px); }
  100% { opacity: 1; transform: translateY(0); }
}

#restart-btn {
  margin-top: 48px;
  padding: 14px 40px;
  border: 1px solid var(--healing);
  border-radius: 4px;
  background: transparent;
  color: var(--healing);
  font-size: 18px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
}
#restart-btn:hover { background: rgba(126,200,160,0.08); box-shadow: 0 0 20px rgba(126,200,160,0.15); }

/* ===== 灰烬粒子 Canvas (治愈阶段) ===== */
#ash-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  opacity: 0;
  transition: opacity 1s;
}
#ash-canvas.visible { opacity: 1; }

/* ===== 响应式 ===== */
@media (max-width: 600px) {
  #app { padding: 24px 14px; }
  .app-title { font-size: 36px; letter-spacing: 5px; }
  .app-subtitle { font-size: 15px; }
  .crime-tag { padding: 10px 18px; font-size: 16px; }
  .canvas-wrapper { max-width: 94vw; }
  #flame-btn { width: 96px; height: 96px; }
  #flame-btn .btn-icon { font-size: 36px; }
  .heal-quote { font-size: 20px; }
  #name-input { font-size: 18px; padding: 14px 16px; }
  #generate-btn { font-size: 18px; padding: 14px 44px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- 音频控制 -->

    <svg class="icon-on" viewBox="0 0 24 24"><path d="M12 3v18l-6-6H2v-6h4l6-6zm10 9a7 7 0 0 0-4-6.3v12.6A7 7 0 0 0 22 12zm-4 4.2V7.8A5 5 0 0 1 20 12a5 5 0 0 1-2 4.2z"/></svg>

const HEALING_QUOTES = [
  '你不是失去了一个人，你是找回了自己。',

// 随机选取
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ──── DOM 引用 ────
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const phaseInput = $('#phase-input');
const phasePoster = $('#phase-poster');
const phaseHealing = $('#phase-healing');
const nameInput = $('#name-input');
const crimeTags = $('#crime-tags');
const generateBtn = $('#generate-btn');
const canvasWrapper = $('#canvas-wrapper');
const posterCanvas = $('#poster-canvas');
const fireCanvas = $('#fire-canvas');
const flameBtn = $('#flame-btn');
const flameBtnWrap = $('#flame-btn-wrap');
const flameHint = $('.flame-hint');
const healQuote = $('#heal-quote');
const restartBtn = $('#restart-btn');
const ashCanvas = $('#ash-canvas');
const audioToggle = $('#audio-toggle');

const ctxPoster = posterCanvas.getContext('2d');
const ctxFire = fireCanvas.getContext('2d');
const ctxAsh = ashCanvas.getContext('2d');

// ──── 应用状态 ────
let selectedCrime = null;
let currentName = '';
let sourceCanvas = null;  // 通缉令原始图层 (OffscreenCanvas)
let burnProgress = 0;
let isBurning = false;
let burnStartTime = 0;
const BURN_DURATION = 5000;       // 5秒燃烧
const LONG_PRESS_DURATION = 600;  // 600ms 长按判定
let pressTimer = null;
let pressStartTime = 0;
let isPressing = false;

// ──── Canvas 尺寸管理 ────
function resizeCanvases() {
  const wrapper = canvasWrapper;
  const rect = wrapper.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const iw = Math.floor(w * dpr);
  const ih = Math.floor(h * dpr);

  for (const c of [posterCanvas, fireCanvas]) {
    if (c.width !== iw || c.height !== ih) {
      c.width = iw;
      c.height = ih;
      c.getContext('2d').setTransform(1, 0, 0, 1, 0, 0);
    }
  }
}

function resizeAshCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  ashCanvas.width = window.innerWidth * dpr;
  ashCanvas.height = window.innerHeight * dpr;
  ctxAsh.setTransform(1, 0, 0, 1, 0, 0);
}

window.addEventListener('resize', () => {
  resizeCanvases();
  resizeAshCanvas();
  if (sourceCanvas && !isBurning) renderPosterToMain();
});

// ──── 审计阶段管理 ────
function showPhase(phase) {
  [phaseInput, phasePoster, phaseHealing].forEach(p => p.classList.remove('active'));
  phase.classList.add('active');
}

// ──── 罪名标签初始化 ────
function initCrimeTags() {
  CRIMES.forEach(crime => {
    const tag = document.createElement('span');
    tag.className = 'crime-tag';
    tag.textContent = crime;
    tag.addEventListener('click', () => selectCrime(crime, tag));
    crimeTags.appendChild(tag);
  });
}

function selectCrime(crime, el) {
  $$('.crime-tag').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectedCrime = crime;
  updateGenerateBtn();
}

// 输入验证
function updateGenerateBtn() {
  generateBtn.disabled = !(nameInput.value.trim() && selectedCrime);
}
nameInput.addEventListener('input', updateGenerateBtn);

// ──── PosterRenderer ────
function drawPoster(ctx, w, h, name, crime, verdict) {
  const pad = w * 0.06;

  // 纸张背景
  ctx.fillStyle = '#f4e1b3';
  ctx.fillRect(0, 0, w, h);

  // 做旧纹理：随机污渍
  ctx.save();
  for (let i = 0; i < 60; i++) {
    const sx = Math.random() * w;
    const sy = Math.random() * h;
    const sr = Math.random() * 30 + 5;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    grad.addColorStop(0, 'rgba(160,130,80,0.15)');
    grad.addColorStop(1, 'rgba(160,130,80,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  }
  // 边缘做旧
  const edgeGrad = ctx.createRadialGradient(w/2, h/2, w*0.38, w/2, h/2, w*0.7);
  edgeGrad.addColorStop(0, 'rgba(0,0,0,0)');
  edgeGrad.addColorStop(1, 'rgba(80,60,30,0.25)');
  ctx.fillStyle = edgeGrad;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();

  // 三层边框
  const b1 = pad, b2 = pad + 6, b3 = pad + 14;
  // 外层粗黑线
  ctx.strokeStyle = '#1a0f0a';
  ctx.lineWidth = 5;
  ctx.strokeRect(b1, b1, w - b1*2, h - b1*2);
  // 中层留白
  ctx.strokeStyle = '#d4c094';
  ctx.lineWidth = 1;
  ctx.strokeRect(b2, b2, w - b2*2, h - b2*2);
  // 内层金线
  ctx.strokeStyle = '#b8943e';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(b3, b3, w - b3*2, h - b3*2);

  // 角落十字装饰
  const crossSize = 10;
  const crossPositions = [
    [b3, b3], [w - b3, b3], [b3, h - b3], [w - b3, h - b3]
  ];
  ctx.strokeStyle = '#b8943e';
  ctx.lineWidth = 1.5;
  crossPositions.forEach(([cx, cy]) => {
    ctx.beginPath();
    ctx.moveTo(cx - crossSize, cy);
    ctx.lineTo(cx + crossSize, cy);
    ctx.moveTo(cx, cy - crossSize);
    ctx.lineTo(cx, cy + crossSize);
    ctx.stroke();
  });

  const cx = w / 2;
  let cy = b3 + 30;

  // 标题：情感通缉令
  ctx.fillStyle = '#1a0f0a';
  ctx.font = `bold ${w*0.09}px 'STKaiti','KaiTi','楷体','SimSun',serif`;
  ctx.textAlign = 'center';
  ctx.fillText('情感通缉令', cx, cy);
  cy += h * 0.045;

  // 副标题 WANTED
  ctx.fillStyle = '#8b1a1a';
  ctx.font = `bold ${w*0.11}px 'Times New Roman','STSong','SimSun',serif`;
  ctx.fillText('★ WANTED ★', cx, cy);
  cy += h * 0.035;

  // 装饰线
  ctx.strokeStyle = '#b8943e';
  ctx.lineWidth = 0.8;
  const lineY = cy;
  ctx.beginPath();
  ctx.moveTo(w * 0.2, lineY); ctx.lineTo(w * 0.8, lineY);
  ctx.stroke();
  cy += h * 0.04;

  // 嫌疑人肖像区
  const portraitSize = h * 0.18;
  const portraitY = cy;
  ctx.strokeStyle = '#8b1a1a';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.strokeRect(cx - portraitSize*0.55, portraitY, portraitSize*1.1, portraitSize);
  ctx.setLineDash([]);

  // 简笔画人物剪影
  const px = cx, py = portraitY + portraitSize * 0.3;
  ctx.fillStyle = '#1a0f0a';
  ctx.beginPath();
  ctx.arc(px, py, portraitSize*0.12, 0, Math.PI*2);        // 头
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(px, py + portraitSize*0.13);
  ctx.lineTo(px, py + portraitSize*0.42);                    // 身体
  ctx.strokeStyle = '#1a0f0a';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px - portraitSize*0.15, py + portraitSize*0.22);
  ctx.lineTo(px + portraitSize*0.15, py + portraitSize*0.22); // 手臂
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px, py + portraitSize*0.42);
  ctx.lineTo(px - portraitSize*0.12, py + portraitSize*0.65); // 左腿
  ctx.moveTo(px, py + portraitSize*0.42);
  ctx.lineTo(px + portraitSize*0.12, py + portraitSize*0.65); // 右腿
  ctx.stroke();

  // "嫌疑人"标注
  ctx.fillStyle = '#8b1a1a';
  ctx.font = `${w*0.035}px 'STKaiti','KaiTi','楷体',serif`;
  ctx.textAlign = 'center';
  ctx.fillText('【 嫌疑人 】', cx, portraitY + portraitSize + h*0.03);
  cy = portraitY + portraitSize + h * 0.08;

  // 姓名
  ctx.fillStyle = '#1a0f0a';
  ctx.font = `bold ${w*0.08}px 'STKaiti','KaiTi','楷体','SimSun',serif`;
  ctx.fillText(name, cx, cy);
  cy += h * 0.05;

  // 罪名标签
  const crimeW = ctx.measureText(crime).width + 20;
  const crimeH = h * 0.04;
  ctx.fillStyle = '#1a0f0a';
  ctx.fillRect(cx - crimeW/2, cy - crimeH*0.7, crimeW, crimeH);
  ctx.fillStyle = '#f4e1b3';
  ctx.font = `bold ${w*0.038}px 'PingFang SC','Microsoft YaHei',sans-serif`;
  ctx.fillText('罪', cx - crimeW*0.28, cy);
  ctx.fillText(crime, cx + crimeW * 0.12, cy);
  cy += h * 0.06;

  // 装饰线
  ctx.strokeStyle = '#b8943e';
  ctx.lineWidth = 0.6;
  const lineY2 = cy;
  ctx.beginPath();
  ctx.moveTo(w * 0.15, lineY2); ctx.lineTo(w * 0.85, lineY2);
  ctx.stroke();
  cy += h * 0.04;

  // 判决文案（横排，可换行）
  ctx.fillStyle = '#1a0f0a';
  ctx.font = `${w*0.032}px 'STSong','SimSun','宋体',serif`;
  const maxTextWidth = w * 0.72;
  const words = verdict.split('');
  let line = '';
  const lines = [];
  for (const ch of words) {
    const testLine = line + ch;
    if (ctx.measureText(testLine).width > maxTextWidth && line.length > 0) {
      lines.push(line);
      line = ch;
    } else {
      line = testLine;
    }
  }
  if (line) lines.push(line);
  const lineHeight = h * 0.042;
  const textStartY = cy;
  lines.forEach((l, i) => {
    ctx.fillText(l, cx, textStartY + i * lineHeight);
  });
  cy = textStartY + lines.length * lineHeight + h * 0.03;

  // 装饰线
  ctx.strokeStyle = '#b8943e';
  ctx.lineWidth = 0.6;
  const lineY3 = cy;
  ctx.beginPath();
  ctx.moveTo(w * 0.2, lineY3); ctx.lineTo(w * 0.8, lineY3);
  ctx.stroke();
  cy += h * 0.03;

  // 底部文字
  ctx.fillStyle = '#8b1a1a';
  ctx.font = `bold ${w*0.033}px 'STKaiti','KaiTi','楷体',serif`;
  ctx.fillText('情感国际法庭 · 终审判决', cx, cy);
  cy += h * 0.032;
  ctx.font = `${w*0.026}px 'STKaiti','KaiTi','楷体',serif`;
  ctx.fillText('不得上诉 · 立即执行', cx, cy);

  // 红色印章
  const stampX = w - b3 - w*0.1;
  const stampY = h - b3 - h*0.1;
  const stampR = w * 0.11;
  ctx.save();
  ctx.translate(stampX, stampY);
  ctx.rotate(-0.3);
  ctx.fillStyle = 'rgba(180,40,40,0.75)';
  ctx.beginPath();
  ctx.arc(0, 0, stampR, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(244,225,179,0.85)';
  ctx.font = `bold ${stampR*0.7}px 'STKaiti','KaiTi','楷体',serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('已判', 0, 0);
  ctx.restore();
}

function renderPosterToSource() {

function renderPosterToMain() {

  ctxPoster.drawImage(sourceCanvas, 0, 0);
}

// ──── 简化 FBM 噪声 ────
function hash(x, y) {
  let h = x * 374761393 + y * 668265263 + 1274126177;
  h = (h ^ (h >>> 13)) * 1274126177;
  return (h ^ (h >>> 16)) / 4294967296;
}

function smoothNoise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx);
  const sy = fy * fy * (3 - 2 * fy);
  const n00 = hash(ix, iy), n10 = hash(ix + 1, iy);
  const n01 = hash(ix, iy + 1), n11 = hash(ix + 1, iy + 1);
  const nx0 = n00 + (n10 - n00) * sx;
  const nx1 = n01 + (n11 - n01) * sx;
  return nx0 + (nx1 - nx0) * sy;
}

function fbm(x, y, octaves = 3) {
  let value = 0, amp = 1, freq = 1, maxVal = 0;
  for (let i = 0; i < octaves; i++) {
    value += amp * smoothNoise(x * freq, y * freq);
    maxVal += amp;
    amp *= 0.5;
    freq *= 2;
  }
  return value / maxVal;
}

// ──── ParticleSystem ────
const MAX_PARTICLES = 350;
const particlePool = [];

function createParticle(x, y, type = 'fire') {
  // 复用或新建
  let p = particlePool.find(p => !p.alive);
  if (!p) {
    p = {};
    particlePool.push(p);
  }
  p.alive = true;
  p.x = x;
  p.y = y;
  p.type = type;
  if (type === 'fire') {
    p.vx = (Math.random() - 0.5) * 40;
    p.vy = -80 - Math.random() * 140;
    p.life = 0.3 + Math.random() * 0.9;
    p.maxLife = p.life;
    p.size = 2 + Math.random() * 5;
  } else {
    // ash
    p.vx = (Math.random() - 0.5) * 20;
    p.vy = -15 - Math.random() * 35;
    p.life = 1.5 + Math.random() * 2.5;
    p.maxLife = p.life;
    p.size = 1.5 + Math.random() * 3;
  }
  return p;
}

function updateParticles(dt) {
  for (const p of particlePool) {
    if (!p.alive) continue;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    // 火焰抖动
    if (p.type === 'fire') {
      p.vx += (Math.random() - 0.5) * 60 * dt;
    }
    if (p.life <= 0) p.alive = false;
  }
}

function getFireColor(ratio) {
  // ratio = life / maxLife, 1=最亮, 0=熄灭
  if (ratio > 0.7) {
    const t = (ratio - 0.7) / 0.3;
    // 白黄 -> 橙
    const r = 255, g = Math.floor(255 - t * 125), b = Math.floor(240 - t * 200);
    return `rgb(${r},${g},${b})`;
  } else if (ratio > 0.35) {
    const t = (ratio - 0.35) / 0.35;
    // 橙 -> 红
    const r = 255, g = Math.floor(130 - t * 100), b = Math.floor(40 * (1 - t));
    return `rgb(${r},${g},${b})`;
  } else {
    // 红 -> 暗红 -> 透明
    const a = ratio / 0.35;
    return `rgba(180,${Math.floor(15*a)},${Math.floor(5*a)},${a})`;
  }
}

function renderParticles(ctx, canvasW, canvasH) {
  ctx.clearRect(0, 0, canvasW, canvasH);
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particlePool) {
    if (!p.alive) continue;
    const ratio = p.life / p.maxLife;
    if (p.type === 'fire') {
      ctx.fillStyle = getFireColor(ratio);
      ctx.shadowColor = ratio > 0.5 ? 'rgba(255,150,30,0.6)' : 'rgba(255,50,0,0.3)';
      ctx.shadowBlur = p.size * 2.5;
    } else {
      const a = ratio;
      ctx.fillStyle = `rgba(170,160,150,${a})`;
      ctx.shadowColor = 'rgba(180,170,160,0.3)';
      ctx.shadowBlur = p.size * 1.5;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * ratio, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'source-over';
}

// ──── BurnController ────
const BLOCK_SIZE = 4;
let burnCenterX = 0, burnCenterY = 0;
let maxBurnRadius = 0;
let burnedBlocks = null; // Set of "x,y" strings
let frameCount = 0;

function initBurn() {
  const w = posterCanvas.width;
  const h = posterCanvas.height;
  burnCenterX = w / 2;
  burnCenterY = h * 0.45;
  maxBurnRadius = Math.sqrt(w*w + h*h) * 0.65;
  burnedBlocks = new Set();
  frameCount = 0;
}

function updateBurn(dt) {
  if (!isBurning) return;
  frameCount++;

  // 燃烧进度从长按完成后的时间开始
  const elapsed = performance.now() - burnStartTime;
  burnProgress = Math.min(elapsed / BURN_DURATION, 1.0);

  const w = posterCanvas.width;
  const h = posterCanvas.height;

  // 计算燃烧半径
  const baseRadius = burnProgress * maxBurnRadius;
  const noiseScale = burnProgress > 0.05 ? 30 : 5;

  // 更新燃烧遮罩
  const cols = Math.ceil(w / BLOCK_SIZE);
  const rows = Math.ceil(h / BLOCK_SIZE);

  for (let by = 0; by < rows; by++) {
    for (let bx = 0; bx < cols; bx++) {
      const key = `${bx},${by}`;
      if (burnedBlocks.has(key)) continue;

      const cx = bx * BLOCK_SIZE + BLOCK_SIZE / 2;
      const cy = by * BLOCK_SIZE + BLOCK_SIZE / 2;
      const dist = Math.sqrt((cx - burnCenterX)**2 + (cy - burnCenterY)**2);
      const noise = fbm(cx * 0.03, cy * 0.03 + burnProgress * 2, 3) * noiseScale;
      const jitter = (Math.random() - 0.5) * 8;
      const organicRadius = baseRadius + noise + jitter;

      if (dist < organicRadius) {
        burnedBlocks.add(key);
      }
    }
  }

  // 渲染：先恢复未燃烧区域
  ctxPoster.clearRect(0, 0, w, h);
  ctxPoster.drawImage(sourceCanvas, 0, 0);

  // 逐块擦除已燃烧区域
  for (const key of burnedBlocks) {
    const [bx, by] = key.split(',').map(Number);
    const x = bx * BLOCK_SIZE;
    const y = by * BLOCK_SIZE;
    ctxPoster.clearRect(x, y, BLOCK_SIZE, BLOCK_SIZE);
  }

  // 燃烧边缘 glow
  if (burnProgress < 0.95) {
    const edgeGlow = ctxPoster.createRadialGradient(burnCenterX, burnCenterY, baseRadius * 0.85, burnCenterX, burnCenterY, baseRadius + 15);
    edgeGlow.addColorStop(0, 'rgba(0,0,0,0)');
    edgeGlow.addColorStop(0.5, 'rgba(180,40,10,0.25)');
    edgeGlow.addColorStop(1, 'rgba(0,0,0,0)');
    ctxPoster.save();
    ctxPoster.globalCompositeOperation = 'source-over';
    ctxPoster.fillStyle = edgeGlow;
    ctxPoster.fillRect(0, 0, w, h);
    ctxPoster.restore();
  }

  // 在燃烧边缘发射火焰粒子
  if (burnProgress < 0.9) {
    const edgeParticles = Math.floor((1 - burnProgress) * 60) + 10;
    for (let i = 0; i < edgeParticles; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = baseRadius + (Math.random() - 0.5) * 20;
      const px = burnCenterX + Math.cos(angle) * r;
      const py = burnCenterY + Math.sin(angle) * r;
      // 只在画布范围内生成
      if (px > 0 && px < w && py > 0 && py < h) {
        createParticle(px, py, 'fire');
      }
    }
  }

  // 灰烬阶段
  if (burnProgress > 0.7) {
    const ashCount = Math.floor((burnProgress - 0.7) * 80) + 2;
    for (let i = 0; i < ashCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = baseRadius * (0.8 + Math.random() * 0.4);
      const px = burnCenterX + Math.cos(angle) * r;
      const py = burnCenterY + Math.sin(angle) * r;
      if (px > 0 && px < w && py > 0 && py < h) {
        createParticle(px, py, 'ash');
      }
    }
  }

  // 燃烧完成
  if (burnProgress >= 1.0) {
    finishBurning();
  }
}

function renderBurnFrame() {
  const w = fireCanvas.width;
  const h = fireCanvas.height;
  renderParticles(ctxFire, w, h);
}

function finishBurning() {
  isBurning = false;
  // 全部擦除
  ctxPoster.clearRect(0, 0, posterCanvas.width, posterCanvas.height);
  // 转换为纯灰烬
  for (const p of particlePool) {
    if (p.alive && p.type === 'fire') {
      p.type = 'ash';
      p.life = 1 + Math.random() * 2;
      p.maxLife = p.life;
      p.vy = -10 - Math.random() * 40;
      p.vx = (Math.random() - 0.5) * 30;
      p.size = 1.5 + Math.random() * 3;
    }
  }
  // 额外灰烬
  const w = posterCanvas.width;
  const h = posterCanvas.height;
  for (let i = 0; i < 80; i++) {
    const px = Math.random() * w;
    const py = Math.random() * h;
    createParticle(px, py, 'ash');
  }
  // 渐隐火焰按钮
  flameBtnWrap.style.opacity = '0';
  flameBtnWrap.style.transition = 'opacity 0.8s';

  // 启动治愈阶段计时
  setTimeout(showHealingPhase, 3000);
}

function showHealingPhase() {
  // 清理粒子
  for (const p of particlePool) p.alive = false;
  ctxFire.clearRect(0, 0, fireCanvas.width, fireCanvas.height);

  showPhase(phaseHealing);
  healQuote.textContent = pick(HEALING_QUOTES);
  healQuote.style.animation = 'none';
  healQuote.offsetHeight; // reflow
  healQuote.style.animation = 'fadeInUp 1s ease-out';
}

// ──── 动画循环 ────
let lastTime = 0;
let animFrameId = null;

function animate(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  if (dt > 0.1) dt = 0.1; // 防止大帧跳跃
  lastTime = timestamp;

  if (isBurning) {
    updateBurn(dt);
    renderBurnFrame();
  } else if (burnedBlocks && burnedBlocks.size > 0) {
    // 灰烬飘散阶段（燃烧已结束，但粒子仍在飘）
    renderBurnFrame();
  }

  updateParticles(dt);
  animFrameId = requestAnimationFrame(animate);
}

// ──── 长按交互 ────
function onPointerDown(e) {
  if (isBurning || burnProgress >= 1) return;
  e.preventDefault();
  isPressing = true;
  pressStartTime = performance.now();
  flameBtn.classList.add('pressing');
  flameHint.textContent = '继续按住...';

  // 进度环动画
  const circle = flameBtn.querySelector('.progress-ring circle');
  const circumference = 2 * Math.PI * 52;
  circle.setAttribute('stroke-dasharray', circumference);
  circle.setAttribute('stroke-dashoffset', circumference);
  circle.style.transition = `stroke-dashoffset ${LONG_PRESS_DURATION}ms linear`;
  requestAnimationFrame(() => {
    circle.setAttribute('stroke-dashoffset', '0');
  });

  // 600ms 后触发燃烧
  pressTimer = setTimeout(() => {
    if (isPressing) {
      startBurning();
    }
  }, LONG_PRESS_DURATION);
}

function onPointerUp(e) {
  e.preventDefault();
  if (!isPressing) return;
  isPressing = false;
  flameBtn.classList.remove('pressing');
  clearTimeout(pressTimer);

  const circle = flameBtn.querySelector('.progress-ring circle');
  circle.style.transition = 'none';
  circle.setAttribute('stroke-dashoffset', circle.getAttribute('stroke-dasharray'));

  if (!isBurning && burnProgress < 1) {
    flameHint.textContent = '长按点燃';
  }
}

function onPointerLeave(e) {
  if (!isPressing) return;
  isPressing = false;
  flameBtn.classList.remove('pressing');
  clearTimeout(pressTimer);

  const circle = flameBtn.querySelector('.progress-ring circle');
  circle.style.transition = 'none';
  circle.setAttribute('stroke-dashoffset', circle.getAttribute('stroke-dasharray'));
  flameHint.textContent = '长按点燃';
}

flameBtn.addEventListener('pointerdown', onPointerDown);
flameBtn.addEventListener('pointerup', onPointerUp);
flameBtn.addEventListener('pointerleave', onPointerLeave);
flameBtn.addEventListener('pointercancel', onPointerLeave);

function startBurning() {
  isBurning = true;
  burnStartTime = performance.now();
  burnProgress = 0;
  flameHint.textContent = '燃烧中...';
  isPressing = false;
  flameBtn.classList.remove('pressing');
  initBurn();

  // 播放燃烧音效
  audioEngine.playFire();

  // 60fps 动画
  if (!animFrameId || animFrameId <= 0) {
    lastTime = 0;
    animFrameId = requestAnimationFrame(animate);
  }
}

// ──── 生成通缉令 ────
generateBtn.addEventListener('click', () => {
  currentName = nameInput.value.trim();
  if (!currentName || !selectedCrime) return;
  showPhase(phasePoster);
  renderPosterToSource();
  canvasWrapper.classList.add('drop-in');

  // 重置状态
  isBurning = false;
  burnProgress = 0;
  burnedBlocks = null;
  flameBtnWrap.style.opacity = '1';
  flameBtnWrap.style.transition = 'none';
  flameHint.textContent = '长按点燃';
  ctxFire.clearRect(0, 0, fireCanvas.width, fireCanvas.height);
  for (const p of particlePool) p.alive = false;

  // 启动动画循环
  if (!animFrameId) {
    lastTime = 0;
    animFrameId = requestAnimationFrame(animate);
  }
});

// ──── 重新开始 ────
restartBtn.addEventListener('click', () => {
  showPhase(phaseInput);
  burnedBlocks = null;
  sourceCanvas = null;
  isBurning = false;
  burnProgress = 0;
  ctxPoster.clearRect(0, 0, posterCanvas.width, posterCanvas.height);
  ctxFire.clearRect(0, 0, fireCanvas.width, fireCanvas.height);
  for (const p of particlePool) p.alive = false;
  canvasWrapper.classList.remove('drop-in');
  flameBtnWrap.style.opacity = '1';
  flameBtnWrap.style.transition = 'none';
  flameHint.textContent = '长按点燃';
  ashCanvas.classList.remove('visible');
  audioEngine.stopFire();
});

// ──── AudioEngine ────
const audioEngine = {
  ctx: null,
  ambientGain: null,
  fireGain: null,
  isPlaying: false,
  isFirePlaying: false,
  lfo: null,
  noiseNode: null,

  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) { return; }
    if (!this.ctx) return;

    // 创建棕色噪声 —— 使用 AudioBuffer 循环
    const bufferSize = this.ctx.sampleRate * 2; // 2秒循环
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      lastOut = (lastOut + 0.02 * white) / 1.02;
      data[i] = lastOut * 3.5;
    }

    this.noiseNode = this.ctx.createBufferSource();
    this.noiseNode.buffer = buffer;
    this.noiseNode.loop = true;

    // 低通滤波
    const lowpass = this.ctx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 350;
    lowpass.Q.value = 0.7;

    // LFO 调制滤波频率
    this.lfo = this.ctx.createOscillator();
    this.lfo.type = 'sine';
    this.lfo.frequency.value = 0.08;
    const lfoGain = this.ctx.createGain();
    lfoGain.gain.value = 80;
    this.lfo.connect(lfoGain);
    lfoGain.connect(lowpass.frequency);
    this.lfo.start();

    // 主音量
    this.ambientGain = this.ctx.createGain();
    this.ambientGain.gain.value = 0;

    // 火声音量
    this.fireGain = this.ctx.createGain();
    this.fireGain.gain.value = 0;

    // 创建火焰噼啪噪声
    const fireBufferSize = this.ctx.sampleRate * 3;
    const fireBuffer = this.ctx.createBuffer(1, fireBufferSize, this.ctx.sampleRate);
    const fireData = fireBuffer.getChannelData(0);
    for (let i = 0; i < fireBufferSize; i++) {
      fireData[i] = (Math.random() * 2 - 1) * (Math.random() > 0.4 ? 1 : 0.2);
    }
    const fireSource = this.ctx.createBufferSource();
    fireSource.buffer = fireBuffer;
    fireSource.loop = true;

    // 火焰滤波器（噼啪声集中在中高频）
    const fireFilter = this.ctx.createBiquadFilter();
    fireFilter.type = 'bandpass';
    fireFilter.frequency.value = 1800;
    fireFilter.Q.value = 1.2;

    // 连接链
    // 氛围链路
    this.noiseNode.connect(lowpass);
    lowpass.connect(this.ambientGain);
    this.ambientGain.connect(this.ctx.destination);

    // 火焰链路
    fireSource.connect(fireFilter);
    fireFilter.connect(this.fireGain);
    this.fireGain.connect(this.ctx.destination);

    this.noiseNode.start();
    fireSource.start();

    // 存储引用
    this.fireSource = fireSource;
    this.lowpass = lowpass;
  },

  playAmbient() {
    if (!this.ctx || this.isPlaying) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.ambientGain.gain.setTargetAtTime(0.12, this.ctx.currentTime, 1.5);
    this.isPlaying = true;
    audioToggle.classList.remove('muted');
  },

  stopAmbient() {
    if (!this.ctx || !this.isPlaying) return;
    this.ambientGain.gain.setTargetAtTime(0, this.ctx.currentTime, 0.8);
    this.isPlaying = false;
    audioToggle.classList.add('muted');
  },

  toggle() {
    if (this.isPlaying) this.stopAmbient();
    else this.playAmbient();
  },

  playFire() {
    if (!this.ctx || this.isFirePlaying) return;
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.fireGain.gain.setTargetAtTime(0.18, this.ctx.currentTime, 0.3);
    this.isFirePlaying = true;
  },

  stopFire() {
    if (!this.ctx || !this.isFirePlaying) return;
    this.fireGain.gain.setTargetAtTime(0, this.ctx.currentTime, 1.5);
    this.isFirePlaying = false;
  }
};

// ──── 音频按钮事件 ────
audioToggle.addEventListener('click', () => {
  if (!audioEngine.ctx) {
    audioEngine.init();
  }
  audioEngine.toggle();
});

// ──── 首次用户交互时初始化音频 ────
let audioInited = false;
document.body.addEventListener('pointerdown', () => {
  if (!audioInited) {
    audioInited = true;
    audioEngine.init();
    audioEngine.playAmbient();
  }
}, { once: true });

// ──── 初始化 ────
function init() {
  initCrimeTags();
  resizeCanvases();
  resizeAshCanvas();
  // 启动主循环（用于粒子动画等持续性渲染）
  lastTime = 0;
  animFrameId = requestAnimationFrame(animate);
}
init();
</script>
