<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>前任焚烧炉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="top-bar" id="top-bar">
  <div class="top-bar-inner">
    <a class="top-bar-logo" href="/" aria-label="前任焚烧炉首页">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C9.5 7 4.5 11 4.5 15.5C4.5 19.64 7.86 23 12 23C16.14 23 19.5 19.64 19.5 15.5C19.5 11 14.5 7 12 2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 13.5C12.83 13.5 13.5 12.83 13.5 12C13.5 10.5 12.5 9 12 7.5C11.5 9 10.5 10.5 10.5 12C10.5 12.83 11.17 13.5 12 13.5Z" fill="currentColor" opacity="0.55"/></svg>
      <span>前任焚烧炉</span>
    </a>
    <button class="tab-btn active" data-tab="incinerator"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>焚烧炉</button>
    <button class="tab-btn" data-tab="history"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 12H9m6 4H9m3-8V4m-3.94.94L5 8m14 0-3.06-3.06M5 8v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"/></svg>焚烧历史</button>
    <button class="tab-btn" data-tab="leaderboard"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 6 9 6 9z"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 18 9 18 9z"/><path d="M4 22h16"/><path d="M10 22V2h4v20"/><path d="M8 22l-2-7h12l-2 7"/></svg>排行榜</button>
    <button class="tab-btn" data-tab="feed"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>动态</button>
    <span class="top-bar-spacer"></span>
    <span class="auth-user" id="auth-user-label"></span>
    <button class="btn-login" id="btn-show-login">登 录</button>
    <button class="btn-register" id="btn-show-register">注 册</button>
    <button class="btn-logout" id="btn-logout" style="display:none;">退 出</button>
  </div>
</header>

<div id="app">
  <!-- 焚烧炉标签页 -->
  <div class="tab-content active" id="tab-incinerator">
    <p class="app-subtitle">EX INCINERATOR</p>
    <div class="app-divider"></div>
    <div class="phase active" id="phase-input">
      <div class="input-group">
        <label>前任的名字 / 昵称</label>
        <input type="text" id="name-input" placeholder="输入TA的名字..." maxlength="12">
      </div>
      <div class="input-group">
        <label>选择罪名 <span style="color:var(--hot);font-size:13px;"><svg style="width:13px;height:13px;vertical-align:-2px;" viewBox="0 0 24 24" fill="var(--hot)" stroke="none"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg> 本周热门</span></label>
        <div class="crime-tags" id="crime-tags"></div>
      </div>
      <button id="generate-btn" disabled>生 成 通 缉 令</button>
    </div>

    <div class="phase" id="phase-poster">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas class="poster-layer" id="poster-canvas" aria-label="通缉令海报" role="img"></canvas>
        <canvas class="fire-layer" id="fire-canvas" aria-label="燃烧火焰特效" role="img"></canvas>
      </div>
      <div id="flame-btn-wrap">
        <button id="flame-btn" aria-label="长按点燃焚烧">
          <svg class="progress-ring" viewBox="0 0 122 122"><circle cx="61" cy="61" r="52"/></svg>
          <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        </button>
        <span class="flame-hint">长按点燃</span>
      </div>
    </div>

    <div class="phase" id="phase-healing">
      <div id="healing-section">
        <div class="heal-icon"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="20.5" rx="5.5" ry="2" fill="#6B4E2E" stroke="none"/><path d="M15.5 20C15 18 14 17.5 13 17" stroke="#6B4E2E" stroke-width="1"/><path d="M8.5 20C9 18 10 17.5 11 17" stroke="#6B4E2E" stroke-width="1"/><path d="M12 19C12 16 11.5 13.5 12 10" stroke="currentColor" stroke-width="1.6"/><path d="M12 13.5C10.5 12.5 8.5 12 7.5 10.5" stroke="currentColor" stroke-width="1.4"/><path d="M12 11.5C13.5 10.5 15.5 10 16.5 8.5" stroke="currentColor" stroke-width="1.4"/></svg></div>
        <p class="heal-quote" id="heal-quote"></p>
        <canvas id="share-card-canvas" style="display:none;" aria-label="分享卡片"></canvas>
        <button id="save-card-btn" style="display:none;"><svg style="width:16px;height:16px;vertical-align:-3px;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>保存分享卡片</button>
        <button id="restart-btn">再 烧 一 个</button>
        <div class="upgrade-prompt" id="upgrade-prompt" style="display:none;">
          <div class="upgrade-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <h4>今日免费次数已用完</h4>
          <p>登录即可无限体验，<br>全部音效 & 动效永久免费开放</p>
          <button class="btn-upgrade" id="btn-upgrade-login">登 录 / 注 册</button>
          <button class="btn-skip" id="btn-skip-upgrade">明天再说</button>
        </div>
        <p class="donate-link">
          喜欢这个项目？<a href="https://afdian.com" target="_blank" rel="noopener">去爱发电赞赏支持 →</a>
        </p>
      </div>
    </div>
  </div>

  <!-- 焚烧历史标签页 -->
  <div class="tab-content" id="tab-history">
    <div class="history-panel">
      <p class="modal-sub">这些前任，已化为灰烬</p>
      <div class="history-stats" id="history-stats" style="display:none;">
        <span>共焚烧 <strong id="stats-count">0</strong> 位</span>
        <span class="stats-dot">·</span>
        <span>最近一次：<span id="stats-latest">-</span></span>
      </div>
      <div id="history-list"></div>
      <div id="history-empty" style="display:none;">
        <div class="empty-archive">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="16" x2="13" y2="16"/>
          </svg>
          <h4>档案架空空如也</h4>
          <p>去焚烧炉审判第一位前任吧</p>
          <button class="btn-go-incinerator" id="btn-go-incinerator">前往焚烧炉 →</button>
        </div>
      </div>
      <div id="history-loading" style="text-align:center; padding:48px 20px; color:var(--text-muted); letter-spacing:2px; font-size:14px;">加载中...</div>
    </div>
  </div>

  <!-- 排行榜标签页（占位） -->
  <div class="tab-content" id="tab-leaderboard">
    <div class="placeholder-tab">
      <svg class="placeholder-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 6 9 6 9z"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 18 9 18 9z"/><path d="M4 22h16"/><path d="M10 22V2h4v20"/><path d="M8 22l-2-7h12l-2 7"/></svg>
      <h3>焚烧排行榜</h3>
      <p>排行榜功能即将上线<br>敬请期待</p>
    </div>
  </div>

  <!-- 动态标签页（占位） -->
  <div class="tab-content" id="tab-feed">
    <div class="placeholder-tab">
      <svg class="placeholder-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <h3>焚烧动态</h3>
      <p>社区动态功能即将上线<br>敬请期待</p>
    </div>
  </div>
</div>

<!-- 登录/注册弹窗 -->
<div class="auth-modal-overlay" id="auth-modal-overlay" role="dialog" aria-modal="true" aria-label="登录注册">
  <div class="auth-modal">
    <button class="btn-close" id="btn-close-modal" aria-label="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    <h3 id="auth-modal-title">登 录</h3>
    <p class="modal-sub" id="auth-modal-sub">登录后无限体验全部功能</p>
    <input type="email" id="auth-email" placeholder="邮箱地址" autocomplete="email">
    <input type="password" id="auth-password" placeholder="密码（至少6位）" autocomplete="current-password">
    <input type="password" id="auth-password2" placeholder="再次输入密码确认" autocomplete="off" style="display:none;">
    <button class="btn-submit" id="btn-auth-submit">登 录</button>
    <p class="auth-error" id="auth-error" role="alert" aria-live="polite"></p>
    <button class="btn-switch" id="btn-switch-mode">还没有账号？去注册 →</button>
    <button class="btn-forgot" id="btn-forgot-pwd">忘记密码？</button>
  </div>
</div>

<!-- 昵称设置弹窗 -->
<div class="nickname-overlay" id="nickname-overlay" role="dialog" aria-modal="true" aria-label="设置昵称">
  <div class="nickname-modal">
    <h3>设 置 昵 称</h3>
    <p class="modal-sub">设置一个昵称，其他人可以在排行榜上看到你</p>
    <input type="text" id="nickname-input" placeholder="输入昵称（最多10字）" maxlength="10">
    <p class="nickname-hint">昵称将在排行榜和动态中显示，保护你的隐私</p>
    <button class="btn-submit" id="btn-nickname-submit">确 认</button>
  </div>
</div>

<!-- 卡片预览弹窗 -->
<div class="card-modal-overlay" id="card-modal-overlay" role="dialog" aria-modal="true" aria-label="卡片预览">
  <div class="card-modal">
    <button class="btn-close" id="btn-close-card" aria-label="关闭"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    <canvas id="card-preview-canvas" aria-label="卡片预览" role="img"></canvas>
    <button class="btn-download" id="btn-card-download">下载卡片</button>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
