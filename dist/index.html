<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>前任焚烧炉</title>
  <script type="module" crossorigin src="/assets/index-B-F6VuFL.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DA3K2v6T.css">
</head>
<body>

<div id="app">
  <!-- 标签页顶栏 -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="incinerator">🔥 焚烧炉</button>
    <button class="tab-btn" data-tab="history">📜 焚烧历史</button>
    <button class="tab-btn" data-tab="leaderboard">🏆 排行榜</button>
    <button class="tab-btn" data-tab="feed">💬 动态</button>
    <span style="flex:1;"></span>
    <span class="auth-user" id="auth-user-label">未登录</span>
    <button class="btn-login" id="btn-show-login">登 录</button>
    <button class="btn-logout" id="btn-logout" style="display:none;">退 出</button>
  </div>

  <!-- 焚烧炉标签页 -->
  <div class="tab-content active" id="tab-incinerator">
    <div class="phase active" id="phase-input">
      <h1 class="app-title">前任焚烧炉</h1>
      <p class="app-subtitle">EX INCINERATOR</p>
      <div class="input-group">
        <label>前任的名字 / 昵称</label>
        <input type="text" id="name-input" placeholder="输入TA的名字..." maxlength="12">
      </div>
      <div class="input-group">
        <label>选择罪名 <span style="color:var(--hot);font-size:13px;">🔥 本周热门</span></label>
        <div class="crime-tags" id="crime-tags"></div>
      </div>
      <button id="generate-btn" disabled>生 成 通 缉 令</button>
    </div>

    <div class="phase" id="phase-poster">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <canvas class="poster-layer" id="poster-canvas"></canvas>
        <canvas class="fire-layer" id="fire-canvas"></canvas>
      </div>
      <div id="flame-btn-wrap">
        <button id="flame-btn">
          <svg class="progress-ring" viewBox="0 0 122 122"><circle cx="61" cy="61" r="52"/></svg>
          <span class="btn-icon">🔥</span>
        </button>
        <span class="flame-hint">长按点燃</span>
      </div>
    </div>

    <div class="phase" id="phase-healing">
      <div id="healing-section">
        <div class="heal-icon">🌱</div>
        <p class="heal-quote" id="heal-quote"></p>
        <canvas id="share-card-canvas" style="display:none;"></canvas>
        <button id="save-card-btn" style="display:none;">📥 保存分享卡片</button>
        <button id="save-db-btn" style="display:none;">🔥 保存到历史</button>
        <div id="save-db-status" style="display:none;"></div>
        <button id="restart-btn">再 烧 一 个</button>
        <div class="upgrade-prompt" id="upgrade-prompt" style="display:none;">
          <div class="upgrade-icon">🔐</div>
          <h4>今日免费次数已用完</h4>
          <p>登录即可无限体验，<br>全部音效 & 动效永久免费开放</p>
          <button class="btn-upgrade" id="btn-upgrade-login">登 录 / 注 册</button>
          <button class="btn-skip" id="btn-skip-upgrade">明天再说</button>
        </div>
        <p class="donate-link">
          喜欢这个项目？<a href="https://afdian.com" target="_blank" rel="noopener">去爱发电赞赏支持 →</a>
        </p>
      </div>
    </div>
  </div>

  <!-- 焚烧历史标签页 -->
  <div class="tab-content" id="tab-history">
    <div class="history-panel">
      <h3>焚 烧 历 史</h3>
      <p class="modal-sub">这些前任，已化为灰烬</p>
      <div id="history-list"></div>
      <div id="history-empty" style="display:none; color:var(--text-dim); padding:40px 0; text-align:center; letter-spacing:2px;">
        <span style="font-size:48px; display:block; margin-bottom:16px;">📭</span>
        还没有焚烧记录<br>去审判一个前任吧
      </div>
      <div id="history-loading" style="text-align:center; padding:30px; color:var(--text-dim); letter-spacing:2px;">加载中...</div>
    </div>
  </div>

  <!-- 排行榜标签页（占位） -->
  <div class="tab-content" id="tab-leaderboard">
    <div class="placeholder-tab">
      <span class="placeholder-icon">🏆</span>
      <h3>焚烧排行榜</h3>
      <p>排行榜功能即将上线<br>敬请期待</p>
    </div>
  </div>

  <!-- 动态标签页（占位） -->
  <div class="tab-content" id="tab-feed">
    <div class="placeholder-tab">
      <span class="placeholder-icon">💬</span>
      <h3>焚烧动态</h3>
      <p>社区动态功能即将上线<br>敬请期待</p>
    </div>
  </div>
</div>

<!-- 登录/注册弹窗 -->
<div class="auth-modal-overlay" id="auth-modal-overlay">
  <div class="auth-modal">
    <button class="btn-close" id="btn-close-modal">&times;</button>
    <h3 id="auth-modal-title">登 录</h3>
    <p class="modal-sub" id="auth-modal-sub">登录后无限体验全部功能</p>
    <input type="email" id="auth-email" placeholder="邮箱地址" autocomplete="email">
    <input type="password" id="auth-password" placeholder="密码（至少6位）" autocomplete="current-password">
    <input type="password" id="auth-password2" placeholder="再次输入密码确认" autocomplete="off" style="display:none;">
    <button class="btn-submit" id="btn-auth-submit">登 录</button>
    <p class="auth-error" id="auth-error"></p>
    <button class="btn-switch" id="btn-switch-mode">还没有账号？去注册 →</button>
    <button class="btn-forgot" id="btn-forgot-pwd">忘记密码？</button>
  </div>
</div>

<!-- 昵称设置弹窗 -->
<div class="nickname-overlay" id="nickname-overlay">
  <div class="nickname-modal">
    <h3>设 置 昵 称</h3>
    <p class="modal-sub">设置一个昵称，其他人可以在排行榜上看到你</p>
    <input type="text" id="nickname-input" placeholder="输入昵称（最多10字）" maxlength="10">
    <p class="nickname-hint">昵称将在排行榜和动态中显示，保护你的隐私</p>
    <button class="btn-submit" id="btn-nickname-submit">确 认</button>
  </div>
</div>

<!-- 卡片预览弹窗 -->
<div class="card-modal-overlay" id="card-modal-overlay">
  <div class="card-modal">
    <button class="btn-close" id="btn-close-card">&times;</button>
    <canvas id="card-preview-canvas"></canvas>
    <button class="btn-download" id="btn-card-download">下载卡片</button>
  </div>
</div>

</body>
</html>
